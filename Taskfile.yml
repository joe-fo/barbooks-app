version: '3'

tasks:
  install:
    desc: Install Python dependencies (including dev tools)
    cmds:
      - poetry install

  llm:
    desc: Start Ollama server and ensure phi3:mini model is available
    cmds:
      - |
        if ! pgrep -x ollama > /dev/null; then
          ollama serve &
          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
        else
          echo "Ollama already running."
        fi
      - ollama pull phi3:mini

  api:
    desc: Start the FastAPI backend server on :8000
    cmds:
      - poetry run uvicorn app.main:app --host 127.0.0.1 --port 8000 --reload

  ui:
    desc: Start the Streamlit frontend on :8501
    cmds:
      - poetry run streamlit run app/app.py --server.port 8501

  dev:
    desc: Run Ollama LLM, API, and UI concurrently
    cmds:
      - task: llm
      - task --parallel api ui

  test:
    desc: Run the unit test suite
    cmds:
      - poetry run pytest tests/ -v --ignore=tests/integration

  test-integration:
    desc: Run the integration test suite (Ollama stubbed at HTTP boundary, no server required)
    cmds:
      - poetry run pytest tests/integration/ -v

  ingest:
    desc: "Run the ingest CLI (usage: task ingest -- --url <url> --book <id> --page <n>)"
    cmds:
      - poetry run python -m ingest {{.CLI_ARGS}}

  lint:
    desc: Run Ruff linter and formatter check
    cmds:
      - poetry run ruff check .
      - poetry run ruff format --check .

  cache:clear:
    desc: Clear the local page cache (cache/pages/)
    cmds:
      - rm -rf cache/pages/
      - echo "Page cache cleared."

  stop:
    desc: Stop the API, UI, and Ollama processes
    cmds:
      - pkill -f "uvicorn app.main:app" || true
      - pkill -f "streamlit run" || true
      - pkill -x ollama || true
